<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Portfolio CMS</title>
  <meta name="description" content="Admin panel for managing portfolio content." />
  <meta name="robots" content="noindex, nofollow" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <!-- ========== SETUP SCREEN ========== -->
  <div id="setup-screen" class="auth-screen" style="display:none">
    <div class="auth-card">
      <div class="auth-logo">M<span class="accent">.</span></div>
      <h1 class="auth-heading">First-Time Setup</h1>
      <p class="auth-sub">Create your admin password to get started.</p>
      <form id="setup-form" autocomplete="off">
        <div class="input-group">
          <label for="setup-password">Password</label>
          <input type="password" id="setup-password" placeholder="Min 6 characters" required minlength="6" />
        </div>
        <div class="input-group">
          <label for="setup-confirm">Confirm Password</label>
          <input type="password" id="setup-confirm" placeholder="Repeat password" required minlength="6" />
        </div>
        <div id="setup-error" class="auth-error"></div>
        <button type="submit" class="btn btn-primary btn-full" id="setup-btn">
          <span>Create Account</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </button>
      </form>
    </div>
  </div>

  <!-- ========== LOGIN SCREEN ========== -->
  <div id="login-screen" class="auth-screen" style="display:none">
    <div class="auth-card">
      <div class="auth-logo">M<span class="accent">.</span></div>
      <h1 class="auth-heading">Welcome Back</h1>
      <p class="auth-sub">Enter your password to access the admin panel.</p>
      <form id="login-form" autocomplete="off">
        <div class="input-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Enter your password" required />
        </div>
        <div id="login-error" class="auth-error"></div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">
          <span>Sign In</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </button>
      </form>
    </div>
  </div>

  <!-- ========== ADMIN DASHBOARD ========== -->
  <div id="admin-app" style="display:none">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-brand">
        <span class="brand-logo">M<span class="accent">.</span></span>
        <span class="brand-label">ADMIN</span>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-link active" data-view="dashboard" id="nav-dashboard">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span>Dashboard</span>
        </a>
        <a href="#" class="nav-link" data-view="projects" id="nav-projects">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 17 12 22 22 17"/><path d="M2 12 12 17 22 12"/><path d="M12 2 2 7 12 12 22 7 12 2z"/></svg>
          <span>Projects</span>
        </a>
        <a href="#" class="nav-link" data-view="sections" id="nav-sections">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/></svg>
          <span>Sections</span>
        </a>
        <a href="#" class="nav-link" data-view="media" id="nav-media">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
          <span>Media</span>
        </a>
        <a href="#" class="nav-link" data-view="settings" id="nav-settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
          <span>Settings</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="/" target="_blank" class="nav-link" id="nav-view-site">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></svg>
          <span>View Site</span>
        </a>
        <a href="#" class="nav-link" id="nav-logout">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
          <span>Logout</span>
        </a>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main id="main-content">
      <header id="top-bar">
        <div class="topbar-left">
          <button id="sidebar-toggle" class="icon-btn" aria-label="Toggle sidebar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
          </button>
          <h2 id="page-title">Dashboard</h2>
        </div>
        <div class="topbar-right">
          <div class="search-box" id="global-search-box">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" id="global-search" placeholder="Search projects..." />
          </div>
        </div>
      </header>

      <!-- Views Container -->
      <div id="views-container">
        <!-- Dashboard View -->
        <div id="view-dashboard" class="view active"></div>

        <!-- Projects View -->
        <div id="view-projects" class="view"></div>

        <!-- Sections View -->
        <div id="view-sections" class="view"></div>

        <!-- Media View -->
        <div id="view-media" class="view"></div>

        <!-- Settings View -->
        <div id="view-settings" class="view"></div>
      </div>
    </main>
  </div>

  <!-- ========== MODAL ========== -->
  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div id="modal-container" class="modal-container">
      <div class="modal-header">
        <h3 id="modal-title">Modal</h3>
        <button id="modal-close" class="icon-btn" aria-label="Close modal">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div id="modal-body" class="modal-body"></div>
      <div id="modal-footer" class="modal-footer"></div>
    </div>
  </div>

  <!-- ========== CONFIRM DIALOG ========== -->
  <div id="confirm-overlay" class="modal-overlay confirm-overlay" style="display:none">
    <div class="confirm-dialog">
      <div class="confirm-icon" id="confirm-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>
      </div>
      <h3 id="confirm-title">Are you sure?</h3>
      <p id="confirm-message">This action cannot be undone.</p>
      <div class="confirm-actions">
        <button id="confirm-cancel" class="btn btn-ghost">Cancel</button>
        <button id="confirm-ok" class="btn btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <!-- ========== TOAST CONTAINER ========== -->
  <div id="toast-container"></div>

  <script src="admin.js"></script>
</body>
</html>
